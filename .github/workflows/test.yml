name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mjs-tests:
    name: install.test.mjs (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run mikko-install smoke tests
        run: node .claude/skills/mikko-install/install.test.mjs

  sh-tests:
    name: install.test.sh (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run install.sh dry-run tests
        run: bash install.test.sh
